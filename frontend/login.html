<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlumniArc – Log In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
<div class="page">

  <nav class="navbar">
    <img src="logo.png" alt="AlumniArc Logo" class="nav-logo" />
  </nav>

  <div class="form-section">

    <div class="auth-hero">
      <div class="auth-emoji">👩🏾‍💻</div>
      <h2>Welcome back!</h2>
      <p class="section-sub">Sign in to your AlumniArc account</p>
    </div>

    <div class="form-group" id="group-login-email">
      <label>Email address</label>
      <input type="email" id="login-email" placeholder="you@example.com" />
      <div class="inline-error-msg" id="error-login-email">Please enter a valid email address.</div>
    </div>

    <div class="form-group" id="group-login-pw">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="login-pw" placeholder="Your password" />
        <button class="toggle-pw" onclick="togglePassword()" type="button">👁</button>
      </div>
      <div class="inline-error-msg" id="error-login-pw">Please enter your account password.</div>
    </div>

    <div class="forgot-row">
      <a href="#">Forgot password?</a>
    </div>

    <button class="btn-primary" onclick="validateAndProcessLogin()">Log In</button>

    <div class="divider-text"><span>or</span></div>

    <button class="btn-google">
      <img src="https://www.google.com/favicon.ico" alt="Google" class="google-icon" />
      Continue with Google
    </button>

    <p class="auth-link">Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>

</div>

<script>
  function clearErrors() {
    document.querySelectorAll('.form-group').forEach(group => group.classList.remove('field-error'));
    document.querySelectorAll('.inline-error-msg').forEach(msg => msg.style.display = 'none');
  }

  function showError(groupId, errorId) {
    document.getElementById(groupId).classList.add('field-error');
    document.getElementById(errorId).style.display = 'block';
  }

  function togglePassword() {
    const pw = document.getElementById("login-pw");
    pw.type = pw.type === "password" ? "text" : "password";
  }

  function validateAndProcessLogin() {
    clearErrors();
    let hasErrors = false;

    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-pw').value;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!email || !emailRegex.test(email)) {
      showError('group-login-email', 'error-login-email');
      hasErrors = true;
    }

    if (!password) {
      showError('group-login-pw', 'error-login-pw');
      hasErrors = true;
    }

    if (!hasErrors) {
      // Check if user object data exists within browser cache environment
      const systemCacheData = localStorage.getItem('alumniProfileMaster');
      
      if (systemCacheData) {
        const cachedUser = JSON.parse(systemCacheData);
        
        // Dynamic Role Router Based On Registration State Meta Parameters
        const routingMatrix = {
          alumni: 'profile.html',
          student: 'student-dashboard.html',
          partner: 'partner-dashboard.html',
          admin: 'admin-dashboard.html',
          superadmin: 'superadmin-dashboard.html'
        };
        
        const landingDestination = routingMatrix[cachedUser.persona] || 'dashboard.html';
        window.location.href = landingDestination;
      } else {
        // Fallback default routing map destination if system is run stand-alone
        window.location.href = 'dashboard.html';
      }
    }
  }
</script>
</body>
</html>
