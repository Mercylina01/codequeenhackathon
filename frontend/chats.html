<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlumniArc - Interactive Messaging</title>
  <link rel="stylesheet" href="chats.css">
</head>
<body>

<div class="app-container">

  <aside class="sidebar">
    <div class="logo-area"><img src="logo.png" alt="Logo"></div>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="feed.html">🌐 Feed</a>
    <a href="chats.html" class="active">💬 Chats</a>
    <a href="profile.html">👤 My Profile</a>
    <a href="mentors.html">🎓 Mentors</a>
    <a href="eventscalendar.html">📅 Events</a>
    <a href="jobs.html">💼 Jobs</a>
    <a href="login.html" class="danger" style="margin-top: auto;" onclick="return confirmLogout(event)">🚪 Log Out</a>
  </aside>

  <main class="chats-workspace">
    
    <section class="conversations-sidebar" id="left-directory-panel">
      <div class="search-header">
        <div class="title-row">
          <h1>Chats</h1>
          <button class="new-chat-btn" onclick="toggleNewChatModal(false)">+ New</button>
        </div>
        <div class="search-box-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="directory-searcher" placeholder="Search conversations..." oninput="filterConversationsEngine()">
        </div>
      </div>

      <div class="conversations-scroll-area" id="chat-cards-list-container">
        </div>
    </section>

    <section class="active-chat-window hidden-mobile" id="right-chat-canvas">
      
      <div class="chat-window-header">
        <div class="target-info">
          <button class="back-nav-btn" onclick="closeActiveChatGoBack()">← Close</button>
          <div class="avatar-box" id="active-chat-avatar">...</div>
          <div>
            <h2 id="active-chat-title">Select a Chat</h2>
            <p id="active-chat-subtitle">Choose from the list to start messaging</p>
          </div>
        </div>
      </div>

      <div class="chat-messages-canvas" id="chat-stream-box"></div>

      <div class="emoji-popover-panel hidden" id="whatsapp-emoji-box">
        <button class="emoji-grid-item" onclick="selectPickerEmoji('😀')">😀</button>
        <button class="emoji-grid-item" onclick="selectPickerEmoji('😂')">😂</button>
        <button class="emoji-grid-item" onclick="selectPickerEmoji('🚀')">🚀</button>
        <button class="emoji-grid-item" onclick="selectPickerEmoji('🎉')">🎉</button>
        <button class="emoji-grid-item" onclick="selectPickerEmoji('👏🏾')">👏🏾</button>
        <button class="emoji-grid-item" onclick="selectPickerEmoji('🔥')">🔥</button>
        <button class="emoji-grid-item" onclick="selectPickerEmoji('❤️')">❤️</button>
        <button class="emoji-grid-item" onclick="selectPickerEmoji('👩🏾‍💻')">👩🏾‍💻</button>
        <button class="emoji-grid-item" onclick="selectPickerEmoji('🙌')">🙌</button>
        <button class="emoji-grid-item" onclick="selectPickerEmoji('✨')">✨</button>
        <button class="emoji-grid-item" onclick="selectPickerEmoji('💼')">💼</button>
        <button class="emoji-grid-item" onclick="selectPickerEmoji('🎓')">🎓</button>
      </div>

      <div class="chat-control-toolbar">
        <div class="input-box-wrapper">
          <input type="file" id="media-attachment-input" class="hidden-file-input" onchange="fileUploadedNotification(this)">
          <button class="action-icon-btn" title="Attach file" onclick="triggerFileUploadClick()">📎</button>
          
          <button class="action-icon-btn" title="Toggle Emojis" onclick="toggleWhatsAppEmojiBox(event)">😊</button>
          
          <input type="text" id="chat-input-field" placeholder="Type a message..." onkeypress="handleKeySubmit(event)">
          <button class="send-action-btn" onclick="submitMessage()">➔</button>
        </div>
      </div>
    </section>

  </main>
</div>

<div class="modal-overlay hidden" id="new-chat-modal-view">
  <div class="modal-card">
    <h3>Start a New Conversation</h3>
    <input type="text" id="new-contact-name-field" placeholder="Enter contact name or cohort identity...">
    <div class="modal-actions">
      <button class="new-chat-btn" style="background:#6b5875;" onclick="toggleNewChatModal(true)">Cancel</button>
      <button class="new-chat-btn" onclick="createNewChatSession()">Create</button>
    </div>
  </div>
</div>

<script>
  let activeThreadId = 'cohort8';

  const chatDatabase = {
    cohort8: { title: "Cohort 8 Group", subtitle: "Alumni Hub · 48 Members", avatar: "👩‍💻", type: "community", messages: [{ sender: "Alumni Admin", text: "Hello Cohort 8! System updates post here.", isIncoming: true, isAdmin: true, time: "10:00 AM" }] },
    alumni_general: { title: "AlumniArc General Hub", subtitle: "Global Community Announcement Space", avatar: "🌐", type: "community", messages: [{ sender: "Super Admin", text: "Welcome to the central Alumni Hub.", isIncoming: true, isAdmin: true, time: "Yesterday" }] },
    grace: { title: "Grace Nakato", subtitle: "Senior Software Engineer", avatar: "👩🏽‍🏫", type: "direct", messages: [{ sender: "Grace Nakato", text: "Let me know when you are free.", isIncoming: true, isAdmin: false, time: "1h ago" }] }
  };

  function renderConversationCards() {
    const container = document.getElementById('chat-cards-list-container');
    if (!container) return;
    container.innerHTML = '';

    const sections = { community: "Community Chats", direct: "One on One Chats" };
    
    Object.keys(sections).forEach(typeKey => {
      const title = document.createElement('div');
      title.className = 'list-section-title';
      title.innerText = sections[typeKey];
      container.appendChild(title);

      Object.keys(chatDatabase).forEach(key => {
        const item = chatDatabase[key];
        if (item.type !== typeKey) return;

        const card = document.createElement('div');
        card.className = `chat-item-card ${activeThreadId === key ? 'active' : ''}`;
        card.setAttribute('data-search-name', item.title.toLowerCase());
        card.onclick = () => loadChatThread(key);

        card.innerHTML = `
          <div class="avatar-box">${item.avatar}</div>
          <div class="chat-item-details">
            <div class="chat-item-meta">
              <span class="name">${item.title}</span>
            </div>
            <div class="preview-msg">${item.messages[item.messages.length - 1]?.text || 'No messages yet...'}</div>
          </div>
        `;
        container.appendChild(card);
      });
    });
  }

  function filterConversationsEngine() {
    const query = document.getElementById('directory-searcher').value.toLowerCase().trim();
    const cards = document.querySelectorAll('.chat-item-card');
    
    cards.forEach(card => {
      const name = card.getAttribute('data-search-name');
      if (name.includes(query)) {
        card.style.display = 'flex';
      } else {
        card.style.display = 'none';
      }
    });
  }

  function toggleWhatsAppEmojiBox(e) {
    e.stopPropagation();
    document.getElementById('whatsapp-emoji-box').classList.toggle('hidden');
  }

  // Inserts chosen picker icon into input field natively
  function selectPickerEmoji(emoji) {
    const field = document.getElementById('chat-input-field');
    field.value += emoji;
    document.getElementById('whatsapp-emoji-box').classList.add('hidden');
    field.focus();
  }

  document.addEventListener('click', () => {
    document.getElementById('whatsapp-emoji-box').classList.add('hidden');
  });

  function loadChatThread(id) {
    activeThreadId = id;
    renderConversationCards();
    renderMessages();
    
    document.getElementById('left-directory-panel').classList.add('hidden-mobile');
    document.getElementById('right-chat-canvas').classList.remove('hidden-mobile');
  }

  function closeActiveChatGoBack() {
    document.getElementById('left-directory-panel').classList.remove('hidden-mobile');
    document.getElementById('right-chat-canvas').classList.add('hidden-mobile');
  }

  function toggleNewChatModal(shouldClose) {
    const modal = document.getElementById('new-chat-modal-view');
    modal.classList.toggle('hidden', shouldClose);
    document.getElementById('new-contact-name-field').value = '';
  }

  function createNewChatSession() {
    const nameInput = document.getElementById('new-contact-name-field').value.trim();
    if (!nameInput) return;

    const sessionKey = 'custom_' + Date.now();
    chatDatabase[sessionKey] = {
      title: nameInput,
      subtitle: "Direct Message Session Channel",
      avatar: "👤",
      type: "direct",
      messages: []
    };

    toggleNewChatModal(true);
    loadChatThread(sessionKey);
  }

  function renderMessages() {
    const streamBox = document.getElementById('chat-stream-box');
    const activeData = chatDatabase[activeThreadId];
    if (!streamBox || !activeData) return;

    streamBox.innerHTML = '';
    document.getElementById('active-chat-title').innerText = activeData.title;
    document.getElementById('active-chat-subtitle').innerText = activeData.subtitle;
    document.getElementById('active-chat-avatar').innerText = activeData.avatar;

    activeData.messages.forEach(msg => {
      const row = document.createElement('div');
      row.className = `msg-bubble-row ${msg.isIncoming ? 'incoming' : 'outgoing'}`;

      if (msg.isIncoming) {
        const identity = document.createElement('div');
        identity.className = 'sender-identity';
        identity.innerText = msg.sender;
        if (msg.isAdmin) identity.innerHTML += ` <span class="org-tag">ORG</span>`;
        row.appendChild(identity);
      }

      const bubble = document.createElement('div');
      bubble.className = 'msg-text-bubble';
      bubble.innerText = msg.text;
      row.appendChild(bubble);

      const footer = document.createElement('div');
      footer.className = 'msg-status-footer';
      footer.innerText = msg.time + " ";

      if (!msg.isIncoming) {
        footer.innerHTML += ` <span class="status-tick">✓✓</span>`;
      }

      row.appendChild(footer);
      streamBox.appendChild(row);
    });
    streamBox.scrollTop = streamBox.scrollHeight;
  }

  function submitMessage() {
    const field = document.getElementById('chat-input-field');
    const txt = field.value.trim();
    if (!txt) return;

    chatDatabase[activeThreadId].messages.push({ sender: "You", text: txt, isIncoming: false, time: "Just now" });
    field.value = '';
    renderMessages();
    renderConversationCards();
  }

  function handleKeySubmit(e) { if (e.key === 'Enter') submitMessage(); }
  function triggerFileUploadClick() { document.getElementById('media-attachment-input').click(); }
  function fileUploadedNotification(input) {
    if(input.files[0]) {
      document.getElementById('chat-input-field').value += ` 📎 [File: ${input.files[0].name}]`;
    }
  }
  function confirmLogout(e) { if(!confirm("Are you sure you want to log out?")) e.preventDefault(); }

  window.addEventListener('DOMContentLoaded', () => {
    renderConversationCards();
    renderMessages();
  });
</script>
</body>
</html>
